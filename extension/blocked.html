<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shorts ブロック中 - ban-shorts</title>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1a1a1a;
      --bg: #f6f6f4;
      --muted: #666;
      --accent: #c23b22;
    }
    @media (prefers-color-scheme: dark) {
      :root { --fg: #f0f0f0; --bg: #141414; --muted: #aaa; }
    }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--fg);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main { text-align: center; max-width: 28rem; }
    .mark {
      font-size: 4rem;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { color: var(--muted); margin: 0.25rem 0; }
  </style>
</head>
<body>
  <main>
    <div class="mark">⛔</div>
    <h1>Shorts をブロック中</h1>
    <p>ban-shorts によって Shorts の視聴は無効化されています。</p>
  </main>
</body>
</html>
